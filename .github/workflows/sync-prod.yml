name: Sync Production Repository

on:
  push:
    branches:
      - prod
    paths:
      - 'apps/server/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/sync-prod.yml'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: prod
          fetch-depth: 0
          persist-credentials: false

      - name: Verify PROD_PAT
        env:
          PROD_PAT: ${{ secrets.PROD_PAT }}
        run: |
          if [ -z "$PROD_PAT" ]; then
            echo "PROD_PAT is EMPTY"
            exit 1
          fi

          echo "PROD_PAT FOUND"
          echo "Token Length: ${#PROD_PAT}"

      - name: Push to Production Repository
        env:
          PROD_PAT: ${{ secrets.PROD_PAT }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Remove any leftover auth header from checkout, just in case
          git config --global --unset-all http.https://github.com/.extraheader || true

          git remote add production https://x-access-token:${PROD_PAT}@github.com/globalsuccess080-afk/veo-lms.git

          git push production HEAD:main --force
