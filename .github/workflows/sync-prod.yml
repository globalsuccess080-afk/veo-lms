name: Sync Production Repository

on:
  push:
    branches:
      - prod

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to production
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote add production https://x-access-token:${{ secrets.PROD_PAT }}@github.com/globalsuccess080-afk/veo-lms.git

          git push production dev:main --force
