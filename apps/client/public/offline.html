<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <title>VeoLMS Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #f8fafc;
      }

      main {
        width: min(92vw, 420px);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        border-radius: 18px;
        background: #fff;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.6;
      }

      button {
        margin-top: 24px;
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        background: #6366f1;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.png" alt="VeoLMS" />
      <h1>You are offline</h1>
      <p>Saved pages may still open, but payments, videos, admin tools, and uploads need an internet connection.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
